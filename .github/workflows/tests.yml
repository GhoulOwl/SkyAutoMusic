name: Tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: python -B -m unittest discover -s tests -v
